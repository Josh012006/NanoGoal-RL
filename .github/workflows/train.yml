name: Train models

on:
  push:
  pull_request:

permissions:
  contents: write
  issues: write

jobs:
  train:
    runs-on: [self-hosted, linux, cpu]
    timeout-minutes: 30

    env:
      VENV: .venv/bin

    steps:
      - name: Save topology cache
        run: |
          rm -rf /tmp/topology_cache_backup
          mkdir -p /tmp/topology_cache_backup
          if ls topology_cache* 2>/dev/null | grep -q .; then
            cp topology_cache* /tmp/topology_cache_backup/
            echo "Topology cache saved to /tmp."
          else
            echo "No topology cache found — nothing to save."
          fi

      - name: Fetch code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Restore topology cache
        run: |
          if ls /tmp/topology_cache_backup/topology_cache* 2>/dev/null | grep -q .; then
            cp /tmp/topology_cache_backup/topology_cache* .
            echo "Topology cache restored."
          else
            echo "No topology cache to restore."
          fi

      - name: Read train.flag
        id: read_flag
        run: |
          set -e

          FLAG_FILE=".github/ci/train.flag"

          if [ ! -f "$FLAG_FILE" ]; then
            echo "train=false" >> "$GITHUB_OUTPUT"
            echo "generate_cache=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS='=' read -r key value; do
            [ -z "$key" ] && continue
            case "$key" in
              train) echo "train=$value" >> "$GITHUB_OUTPUT" ;;
              generate_cache) echo "generate_cache=$value" >> "$GITHUB_OUTPUT" ;;
            esac
          done < "$FLAG_FILE"

      - name: Stop job if training is disabled
        if: steps.read_flag.outputs.train == 'false'
        run: |
          echo "Training disabled → stopping job"
          exit 0

      - name: Clean up previous training artifacts
        if: steps.read_flag.outputs.train == 'true'
        run: |
          # Kill any stale training process
          if [ -f logs/train.pid ]; then
            OLD_PID=$(cat logs/train.pid)
            kill "$OLD_PID" 2>/dev/null || true
            echo "Killed stale training process (PID $OLD_PID)."
          fi
          # Remove previous training logs and status files
          rm -f logs/train_*.log logs/train_*.DONE logs/train_*.FAILED logs/train_session.log logs/train.pid
          echo "Cleaned up previous training artifacts."

      - name: Install dependencies
        if: steps.read_flag.outputs.train == 'true'
        run: |
          set -e
          python3 -m venv .venv
          $VENV/python -m pip install --upgrade pip
          $VENV/python -m pip install -r requirements.txt

      - name: Prepare environment
        if: steps.read_flag.outputs.train == 'true'
        run: |
          set -e
          mkdir -p plots/easy plots/medium plots/hard logs

      - name: Precompute topology cache
        if: steps.read_flag.outputs.train == 'true'
        run: |
          set -e
          if [ "${{ steps.read_flag.outputs.generate_cache }}" = "true" ]; then
            echo "generate_cache=true → forcing cache regeneration..."
            $VENV/python precompute_cache.py
            echo "Cache regenerated."
          elif [ ! -f "topology_cache.dir" ] && [ ! -f "topology_cache.dat" ] && [ ! -f "topology_cache.db" ] && [ ! -f "topology_cache" ]; then
            echo "Topology cache not found — running precompute_cache.py..."
            $VENV/python precompute_cache.py
            echo "Cache generated."
          else
            echo "Topology cache already exists — skipping precompute."
          fi

      - name: Launch training in background
        if: steps.read_flag.outputs.train == 'true'
        run: |
          set -e

          WORK_DIR="$(pwd)"
          FLAG_FILE="$WORK_DIR/.github/ci/train.flag"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}"

          chmod +x .github/ci/train.sh

          # Export variables needed by train.sh for git push and gh issue
          export GITHUB_TOKEN="${{ github.token }}"
          export GITHUB_REPOSITORY="${{ github.repository }}"
          export GH_TOKEN="${{ github.token }}"

          # Launch train.sh detached from the current shell
          # nohup ensures it survives after the GitHub Actions job ends
          nohup bash .github/ci/train.sh \
            "$FLAG_FILE" \
            "$SHA" \
            "$BRANCH" \
            "$WORK_DIR" \
            > "$WORK_DIR/logs/train_session.log" 2>&1 &

          TRAIN_PID=$!
          echo $TRAIN_PID > "$WORK_DIR/logs/train.pid"
          disown $TRAIN_PID

          echo "Training launched (PID $TRAIN_PID)."
          echo "Monitor with: tail -f $WORK_DIR/logs/train_session.log"